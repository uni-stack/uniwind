name: Release Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: true
        type: boolean
        default: true
      npm_tag:
        description: 'NPM tag (e.g., latest, beta, next)'
        required: true
        type: string
        default: 'latest'
      version:
        description: 'Version override (optional, e.g., 1.0.0, or "auto" to auto-increment)'
        required: false
        type: string
        default: 'auto'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node.js (for npm with OIDC support)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Build library
        run: bun run build

      - name: Check types
        run: bun run check:typescript

      - name: Check linting and formatting
        run: bun run lint

      - name: Check circular dependencies
        run: bun run circular:check

      - name: Run tests
        run: bun run test

      - name: Release with release-it
        working-directory: packages/uniwind
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION_INPUT="${{ inputs.version }}"
          DRY_RUN="${{ inputs.dry_run }}"
          NPM_TAG="${{ inputs.npm_tag }}"

          # Build release-it command
          RELEASE_IT_CMD="npx release-it"

          # Add dry-run flag if needed
          if [ "$DRY_RUN" = "true" ]; then
            RELEASE_IT_CMD="$RELEASE_IT_CMD --dry-run"
          fi

          # Add npm tag if specified
          if [ -n "$NPM_TAG" ] && [ "$NPM_TAG" != "latest" ]; then
            RELEASE_IT_CMD="$RELEASE_IT_CMD --preRelease=$NPM_TAG"
          fi

          # Add version if specified and not "auto"
          if [ -n "$VERSION_INPUT" ] && [ "$VERSION_INPUT" != "auto" ]; then
            RELEASE_IT_CMD="$RELEASE_IT_CMD --setVersion=$VERSION_INPUT"
          fi

          # Add npm publish flag
          RELEASE_IT_CMD="$RELEASE_IT_CMD --npm.publish"

          # Add GitHub release flag
          RELEASE_IT_CMD="$RELEASE_IT_CMD --github.release"

          # Run the command with no-interaction mode
          $RELEASE_IT_CMD --no-interactive --verbose
          
      - name: Comment on closed issues
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Parse changelog for issue references (e.g., #123)
          ISSUES=$(grep -oE '#[0-9]+' CHANGELOG.md 2>/dev/null | sort -u || echo "")
          
          for issue in $ISSUES; do
            gh issue comment "$issue" \
              --body "🎉 This issue has been resolved in [v${{ steps.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})"
          done

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **NPM Tag:** ${{ inputs.npm_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ inputs.version || 'auto-increment' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "### ℹ️ This was a dry run using release-it" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Release completed with release-it!" >> $GITHUB_STEP_SUMMARY
          fi
